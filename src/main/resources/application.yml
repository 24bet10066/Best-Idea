spring:
  application:
    name: PartLinQ
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  datasource:
    url: jdbc:h2:mem:partlinqdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # Render.com injects PORT env var; fallback to 8080 for local dev
  port: ${PORT:8080}
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 200

# Java 21: Virtual Threads for massive concurrency
spring.threads.virtual.enabled: true

# CORS — comma-separated list of allowed origins
# Set CORS_ALLOWED_ORIGINS env var in production to include Vercel domain
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:1234}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.partlinq: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      # ddl-auto strategy:
      #   first deploy        → set DDL_AUTO=update (env var) so tables auto-create
      #   stable schema       → leave default 'validate' — fails fast if entity ↔ table drift
      #   schema migrations   → use Flyway/Liquibase, never touch ddl-auto in prod
      # Default is intentionally restrictive. Override with DDL_AUTO env var only when needed.
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # DataSource is configured programmatically by DataSourceConfig (prod profile only).
  # It accepts both URL formats:
  #   postgresql://user:pass@host:5432/dbname  (raw Render URL — auto-parsed)
  #   jdbc:postgresql://host:5432/dbname       (JDBC URL with separate creds)
  # Required env vars: DATABASE_URL, DATABASE_USER, DATABASE_PASSWORD
  #
  # Exclude Spring Boot's DataSource auto-config so DataSourceConfig is the sole owner.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.partlinq: INFO
    org.hibernate.SQL: WARN
