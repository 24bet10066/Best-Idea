spring:
  application:
    name: PartLinQ
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  datasource:
    url: jdbc:h2:mem:partlinqdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # Render.com injects PORT env var; fallback to 8080 for local dev
  port: ${PORT:8080}
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 200

# Java 21: Virtual Threads for massive concurrency
spring.threads.virtual.enabled: true

# CORS — comma-separated list of allowed origins
# Set CORS_ALLOWED_ORIGINS env var in production to include Vercel domain
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:1234}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.partlinq: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      # update: auto-creates tables on first deploy, safe to switch to validate later
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    # Render provides DATABASE_URL in format: postgresql://user:pass@host:5432/dbname
    # Spring needs jdbc:postgresql:// prefix
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.partlinq: INFO
    org.hibernate.SQL: WARN
